<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a2e;
    color: #eee;
  }
  .container { text-align: center; }
  h1 { font-size: 2rem; margin-bottom: 0.5rem; }
  .status {
    font-size: 1.25rem;
    margin-bottom: 1rem;
    min-height: 2rem;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 120px);
    grid-template-rows: repeat(3, 120px);
    gap: 6px;
    margin: 0 auto 1.5rem;
    width: max-content;
  }
  .cell {
    background: #16213e;
    border: 2px solid #0f3460;
    border-radius: 8px;
    font-size: 3rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cell:hover { background: #1a2a50; transform: scale(1.03); }
  .cell.x { color: #e94560; }
  .cell.o { color: #0fbcf9; }
  .cell.win { background: #0f3460; animation: pulse 0.6s ease-in-out infinite alternate; }
  @keyframes pulse { to { background: #1a4a80; } }
  .scores {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 1rem;
    font-size: 1.1rem;
  }
  .scores span { font-weight: 700; }
  .scores .x-score { color: #e94560; }
  .scores .o-score { color: #0fbcf9; }
  button {
    padding: 0.6rem 1.8rem;
    font-size: 1rem;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #e94560;
    color: #fff;
    font-weight: 600;
    transition: background 0.15s;
  }
  button:hover { background: #c73652; }
</style>
</head>
<body>
<div class="container">
  <h1>Tic Tac Toe</h1>
  <div class="scores">
    <div>X: <span class="x-score">0</span></div>
    <div>Draws: <span class="d-score">0</span></div>
    <div>O: <span class="o-score">0</span></div>
  </div>
  <div class="status">X's turn</div>
  <div class="board" id="board"></div>
  <button onclick="resetGame()">New Game</button>
</div>
<script>
  const board = document.getElementById('board');
  const statusEl = document.querySelector('.status');
  const wins = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  let cells, turn, gameOver, scores = { X: 0, O: 0, D: 0 };

  function initGame() {
    board.innerHTML = '';
    cells = Array(9).fill('');
    turn = 'X';
    gameOver = false;
    statusEl.textContent = "X's turn";
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.i = i;
      cell.addEventListener('click', handleClick);
      board.appendChild(cell);
    }
  }

  function handleClick(e) {
    const i = +e.target.dataset.i;
    if (gameOver || cells[i]) return;
    cells[i] = turn;
    const el = e.target;
    el.textContent = turn;
    el.classList.add(turn.toLowerCase());

    const winLine = wins.find(w => w.every(j => cells[j] === turn));
    if (winLine) {
      gameOver = true;
      statusEl.textContent = `${turn} wins!`;
      scores[turn]++;
      updateScores();
      winLine.forEach(j => board.children[j].classList.add('win'));
      return;
    }
    if (cells.every(c => c)) {
      gameOver = true;
      statusEl.textContent = "It's a draw!";
      scores.D++;
      updateScores();
      return;
    }
    turn = turn === 'X' ? 'O' : 'X';
    statusEl.textContent = `${turn}'s turn`;
  }

  function updateScores() {
    document.querySelector('.x-score').textContent = scores.X;
    document.querySelector('.o-score').textContent = scores.O;
    document.querySelector('.d-score').textContent = scores.D;
  }

  function resetGame() { initGame(); }
  initGame();
</script>
</body>
</html>
